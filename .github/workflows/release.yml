name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npx electron-builder install-app-deps

      - name: Type check
        run: npm run typecheck

      - name: Compile
        run: npm run build

      - name: Package (macOS, unsigned)
        if: matrix.platform == 'mac' && secrets.CSC_LINK == ''
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package (macOS, signed)
        if: matrix.platform == 'mac' && secrets.CSC_LINK != ''
        run: npm run build:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package (Windows, unsigned)
        if: matrix.platform == 'win' && secrets.WIN_CSC_LINK == ''
        run: npm run build:win

      - name: Package (Windows, signed)
        if: matrix.platform == 'win' && secrets.WIN_CSC_LINK != ''
        run: npm run build:win
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mockforge-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
